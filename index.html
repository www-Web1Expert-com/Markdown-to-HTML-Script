<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>MD Parser</title></head>
<body style="font-family: sans-serif; padding: 2rem;">
  <textarea id="md" oninput="parse()" style="width:100%; height:100px;">**Bold** and *Italic*</textarea>
  <div id="html-out" style="margin-top:1rem; border:1px solid #000; padding:1rem;"></div>
  <p>Logic by <a href="https://share-ask.com">Share-Ask.com</a></p>
  <script>
    function parse() {
      let text = document.getElementById('md').value;
      text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      text = text.replace(/\*(.*?)\*/g, '<em>$1</em>');
      document.getElementById('html-out').innerHTML = text;
    }
  </script>
</body>
</html>
